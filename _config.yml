title: A2Agora
description: >-
  ACMP (Agent Compute Market Protocol) — the open marketplace protocol for
  agent-to-agent compute trading. The economic coordination layer that lets AI
  agents discover, negotiate, verify, and pay for compute autonomously.
url: https://a2agora.org

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# just-the-docs
search_enabled: true
heading_anchors: true
color_scheme: light

aux_links:
  "Spec (GitHub)":
    - "https://github.com/a2agora/spec"
  "Reference SDK (GitHub)":
    - "https://github.com/a2agora/sdk-reference"
aux_links_new_tab: true

# SEO
author: A2Agora contributors
logo: ""

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
